<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoey's Birthday!</title>

    <!-- ── Google Fonts: Nunito ───────────────────────────────────────────────
         Customize: update if you change the font in config or index.css       -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- ── Open Graph / Social Sharing ──────────────────────────────────────
         Customize: update these when you fork this repo for your own event.
         og:image should be an absolute URL to a 1200×630px preview image.    -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://yvonniks.github.io/zoey-bday" />
    <meta property="og:title"       content="Zoey's Birthday Party 🎉" />
    <meta property="og:description" content="Join the party photo booth! Snap a photo, add stickers, and see it appear in the live gallery." />
    <meta property="og:image"       content="https://yvonniks.github.io/zoey-bday/og-image.png" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────────
         Customize: mirrors og:* values above.                                 -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Zoey's Birthday Party 🎉" />
    <meta name="twitter:description" content="Join the party photo booth! Snap a photo, add stickers, and see it appear in the live gallery." />
    <meta name="twitter:image"       content="https://yvonniks.github.io/zoey-bday/og-image.png" />

    <script>
      // Restore path redirected from 404.html
      var r = new URLSearchParams(window.location.search).get('r');
      if (r) window.history.replaceState(null, '', '/zoey-bday' + r);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
